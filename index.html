// Floating particles
const particleColors=["rgba(255,106,61,","rgba(20,184,166,","rgba(245,180,50,","rgba(255,255,255,"];
function createParticles(){
for(let i=0;i<15;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*8)+"s";
p.style.animationDelay=(Math.random()*10)+"s";
p.style.width=p.style.height=(3+Math.random()*5)+"px";
let c=particleColors[Math.floor(Math.random()*particleColors.length)];
p.style.background=c+(0.15+Math.random()*0.2)+")";
document.body.appendChild(p);
}
}
createParticles();

document.getElementById("numToggle").classList.toggle("on",includeNumbers);
}

function toggleEdgy(){
edgyMode=!edgyMode;
document.getElementById("edgyToggle").classList.toggle("on",edgyMode);
showToast(edgyMode?"Edgy mode ON xX_Xx":"Edgy mode OFF");
}

function scoreUsername(name){
let s=0;
let len=name.length;
if(len>=6&&len<=14) s+=4;
else if(len>=4&&len<=18) s+=2;
let hasUpper=false,hasLower=false,hasNum=false;
for(let c of name){
if(c>='A'&&c<='Z') hasUpper=true;
if(c>='a'&&c<='z') hasLower=true;
if(c>='0'&&c<='9') hasNum=true;
}
if(hasUpper&&hasLower) s+=2;
if(hasNum) s+=1;
if(len<=12) s+=2;
if(!/(.)\1{2,}/.test(name)) s+=1;
return Math.min(10,Math.max(1,s));
}

function scoreClass(s){
if(s>=7) return "score-high";
if(s>=4) return "score-mid";
return "score-low";
}

function generate(e){

if(allUsernames.length>=MAX_TOTAL){
showToast("Max "+MAX_TOTAL+" reached. Clear first!");
return;
}

// Ripple effect on generate button
if(e&&e.currentTarget){
let btn=e.currentTarget;
let ripple=document.createElement("span");
ripple.className="ripple";
let rect=btn.getBoundingClientRect();
let size=Math.max(rect.width,rect.height);
ripple.style.width=ripple.style.height=size+"px";
ripple.style.left=(e.clientX-rect.left-size/2)+"px";
ripple.style.top=(e.clientY-rect.top-size/2)+"px";
btn.appendChild(ripple);
setTimeout(function(){ripple.remove()},600);
}

// Show loading overlay
let overlay=document.createElement("div");
overlay.className="generating-overlay";
let spinner=document.createElement("div");
spinner.className="spinner";
overlay.appendChild(spinner);
listEl.style.position="relative";
listEl.appendChild(overlay);

setTimeout(function(){

let mode=document.getElementById("mode").value;
let sep=document.getElementById("separator").value;
let userMaxLen=parseInt(document.getElementById("maxLen").value)||20;
let platformMax=styles[mode].maxLen||999;
let maxLen=Math.min(userMaxLen,platformMax);
let customWord=document.getElementById("customWord").value.trim();
let prefix=document.getElementById("prefix").value.trim();
let suffix=document.getElementById("suffix").value.trim();
let genCount=parseInt(document.getElementById("genCount").value)||50;

let empty=listEl.querySelector(".empty-state");
if(empty) empty.remove();

let frag=document.createDocumentFragment();
let count=0;

for(let i=0;i<genCount;i++){
let adj=random(styles[mode].adj);
let noun=random(styles[mode].noun);
let num=includeNumbers?Math.floor(Math.random()*9999):"";

let username;
if(customWord){
let r=Math.random();
if(r<0.33) username=customWord+sep+noun+(num!==""?(sep+num):"");
else if(r<0.66) username=adj+sep+customWord+(num!==""?(sep+num):"");
else username=customWord+sep+adj+(num!==""?(sep+num):"");
}else{
username=adj+sep+noun+(num!==""?(sep+num):"");
}
if(prefix) username=prefix+sep+username;
if(suffix) username=username+sep+suffix;

if(edgyMode){
username="xX_"+username+"_Xx";
}

if(username.length>maxLen){
username=username.substring(0,maxLen);
}

if(usernameSet.has(username)){i--;continue;}
usernameSet.add(username);
allUsernames.push(username);
addToHistory(username,mode);

let s=scoreUsername(username);

let row=document.createElement("div");
row.className="row slot-spin";
if(i<50) row.style.animationDelay=i*15+"ms";
setTimeout(function(){row.classList.remove("slot-spin")},500+i*15);

let leftDiv=document.createElement("div");
leftDiv.className="row-left";

let scoreSpan=document.createElement("span");
scoreSpan.className="score "+scoreClass(s);
scoreSpan.textContent=s+"/10";

let nameSpan=document.createElement("span");
nameSpan.className="username-text"+(i<30?" typing":"");
nameSpan.textContent=username;
nameSpan.style.cursor="pointer";
nameSpan.addEventListener("click",function(){
navigator.clipboard.writeText(username);
showToast("Copied: "+username);
row.classList.remove("copy-pulse");
void row.offsetWidth;
row.classList.add("copy-pulse");
});

let nameWrap=document.createElement("div");
nameWrap.style.minWidth="0";
nameWrap.appendChild(nameSpan);

let pronun=document.createElement("div");
pronun.className="pronunciation";
pronun.textContent=getPronunciation(username);
nameWrap.appendChild(pronun);

leftDiv.appendChild(scoreSpan);
leftDiv.appendChild(nameWrap);

if(s>=9){
let badge=document.createElement("span");
badge.className="top-badge";
badge.textContent="TOP";
leftDiv.appendChild(badge);
}

let actionsDiv=document.createElement("div");
actionsDiv.className="actions";

let copyBtn=document.createElement("button");
copyBtn.className="copy";
copyBtn.textContent="Copy";
copyBtn.setAttribute("aria-label","Copy "+username);
copyBtn.addEventListener("click",function(e){
navigator.clipboard.writeText(username);
copyBtn.textContent="Copied!";
setTimeout(function(){copyBtn.textContent="Copy"},1200);
showToast("Copied: "+username);
spawnConfetti(e.clientX,e.clientY);
row.classList.remove("copy-pulse");
void row.offsetWidth;
row.classList.add("copy-pulse");
});

let saveBtn=document.createElement("button");
saveBtn.className="save-btn";
saveBtn.textContent="\u2661 Save";
saveBtn.setAttribute("aria-label","Save "+username);
saveBtn.addEventListener("click",function(){
save(username,saveBtn);
saveBtn.classList.remove("heart-pop");
void saveBtn.offsetWidth;
saveBtn.classList.add("heart-pop");
saveBtn.textContent="\u2764\uFE0F Saved!";
});

let checkBtn=document.createElement("button");
checkBtn.className="check";
checkBtn.textContent="Check";
checkBtn.setAttribute("aria-label","Check availability for "+username);
checkBtn.addEventListener("click",function(){
check(username);
});

let shareBtn=document.createElement("button");
shareBtn.className="share-btn";
shareBtn.textContent="Share";
shareBtn.setAttribute("aria-label","Share "+username);
shareBtn.addEventListener("click",function(){
let url=location.origin+location.pathname+"?u="+encodeURIComponent(username);
navigator.clipboard.writeText(url);
shareBtn.textContent="Link copied!";
setTimeout(function(){shareBtn.textContent="Share"},1200);
showToast("Share link copied!");
});

actionsDiv.appendChild(copyBtn);
actionsDiv.appendChild(saveBtn);
actionsDiv.appendChild(checkBtn);
actionsDiv.appendChild(shareBtn);

let bar=document.createElement("div");
bar.className="score-bar";
bar.style.width=(s*10)+"%";
bar.style.background=s>=7?"#2dd4bf":s>=4?"#fbbf24":"#f87171";

let rowWrap=document.createElement("div");
rowWrap.style.flex="1";
rowWrap.style.minWidth="0";

let topRow=document.createElement("div");
topRow.style.display="flex";
topRow.style.justifyContent="space-between";
topRow.style.alignItems="center";

topRow.appendChild(leftDiv);
topRow.appendChild(actionsDiv);
rowWrap.appendChild(topRow);
rowWrap.appendChild(bar);
row.appendChild(rowWrap);

frag.appendChild(row);
count++;
}

listEl.appendChild(frag);

totalGenerated+=count;
updateCounter();

// Remove loading overlay
let ov=listEl.querySelector(".generating-overlay");
if(ov) ov.remove();

listEl.scrollTo({top:listEl.scrollHeight,behavior:"smooth"});

},150);

}

function updateCounter(){
counterEl.textContent=totalGenerated;
counterEl.classList.remove("pop");
void counterEl.offsetWidth;
counterEl.classList.add("pop");
}

function shuffleList(){
let rows=Array.from(listEl.querySelectorAll(".row"));
if(rows.length===0){
showToast("Nothing to shuffle yet!");
return;
}
for(let i=rows.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[rows[i],rows[j]]=[rows[j],rows[i]];
}
rows.forEach(function(r){listEl.appendChild(r)});
showToast("Shuffled!");
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

for(let i=0;i<8;i++){
let c=document.createElement("div");
c.className="confetti-piece";

c.style.top=(y-4)+"px";

let currentCollection="all";

function switchCollection(col){
currentCollection=col;
document.querySelectorAll(".collection-tab").forEach(function(t){
t.classList.toggle("active",t.dataset.col===col);
});
renderFav();
}

function save(name,btn){
let fav=JSON.parse(storage.getItem("fav2"))||[];
if(fav.some(function(f){return f.name===name})){
showToast("Already a favorite!");
return;
}
// Auto-detect collection from current mode
let mode=document.getElementById("mode").value;
let col="all";
if(["gamer","fantasy","minecraft","fortnite","roblox"].includes(mode)) col="gaming";
else if(["instagram","tiktok","aesthetic"].includes(mode)) col="social";
else if(["tech","developer"].includes(mode)) col="dev";
fav.push({name:name,col:col});
storage.setItem("fav2",JSON.stringify(fav));
if(btn){
btn.textContent="Saved!";
btn.style.opacity="0.6";
}
renderFav();
showToast("Saved: "+name);
}

function removeFav(name){
let fav=JSON.parse(storage.getItem("fav2"))||[];
fav=fav.filter(function(f){return f.name!==name});
storage.setItem("fav2",JSON.stringify(fav));
renderFav();
showToast("Removed: "+name);
}

function renderFav(){
let fav=JSON.parse(storage.getItem("fav2"))||[];
// Migrate old format
let oldFav=JSON.parse(storage.getItem("fav"))||[];
if(oldFav.length>0&&fav.length===0){
fav=oldFav.map(function(n){return{name:n,col:"all"}});
storage.setItem("fav2",JSON.stringify(fav));
storage.removeItem("fav");
}

let filtered=currentCollection==="all"?fav:fav.filter(function(f){return f.col===currentCollection});
let box=document.getElementById("favlist");

if(filtered.length===0){
box.innerHTML='<div class="no-fav">'+(fav.length===0?"No favorites yet - click Save on any username":"No favorites in this collection")+'</div>';
return;
}

box.innerHTML="";

filtered.forEach(function(f){
let d=document.createElement("div");
d.className="fav";

let left=document.createElement("span");
left.textContent=f.name;

let actionsDiv=document.createElement("div");
actionsDiv.className="fav-actions";

let copyBtn=document.createElement("button");
copyBtn.textContent="Copy";
copyBtn.setAttribute("aria-label","Copy "+f.name);
copyBtn.addEventListener("click",function(){
navigator.clipboard.writeText(f.name);
copyBtn.textContent="Copied!";
setTimeout(function(){copyBtn.textContent="Copy"},1200);
showToast("Copied: "+f.name);
});

let removeBtn=document.createElement("button");
removeBtn.textContent="Remove";
removeBtn.setAttribute("aria-label","Remove "+f.name);
removeBtn.addEventListener("click",function(){removeFav(f.name)});

actionsDiv.appendChild(copyBtn);
actionsDiv.appendChild(removeBtn);

d.appendChild(left);
d.appendChild(actionsDiv);
box.appendChild(d);
});
}

function exportTXT(){
if(allUsernames.length===0){
showToast("Generate some usernames first!");
return;
}
let blob=new Blob([allUsernames.join("\n")],{type:"text/plain"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="zurvyn-usernames.txt";
a.click();
URL.revokeObjectURL(url);
showToast("Downloaded "+allUsernames.length+" usernames");
}

function exportCSV(){
if(allUsernames.length===0){
showToast("Generate some usernames first!");
return;
}
let csv="Username,Score\n"+allUsernames.map(function(u){
return u+","+scoreUsername(u);
}).join("\n");
let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="zurvyn-usernames.csv";
a.click();
URL.revokeObjectURL(url);
showToast("CSV downloaded with "+allUsernames.length+" usernames");
}

function copyAll(){
if(allUsernames.length===0){
showToast("Generate some usernames first!");
return;
}
navigator.clipboard.writeText(allUsernames.join("\n"));
showToast("Copied all "+allUsernames.length+" usernames");
}

function copyNumbered(){
if(allUsernames.length===0){showToast("Generate some usernames first!");return;}
let text=allUsernames.map(function(u,i){return (i+1)+". "+u}).join("\n");
navigator.clipboard.writeText(text);
showToast("Copied numbered list");
}

function copyComma(){
if(allUsernames.length===0){showToast("Generate some usernames first!");return;}
navigator.clipboard.writeText(allUsernames.join(", "));

// --- Pronunciation Guide ---
function getPronunciation(name){
// Strip edgy wrapping and separators, split into camelCase/separator parts
let clean=name.replace(/^xX_/,"").replace(/_Xx$/,"");
let parts=clean.split(/[_\-.]/).filter(Boolean);
if(parts.length===1){
// Try splitting camelCase
parts=clean.replace(/([a-z])([A-Z])/g,"$1 $2").replace(/([A-Z]+)([A-Z][a-z])/g,"$1 $2").split(/\s+/);
}
// Strip trailing numbers from last part
parts=parts.map(function(p){return p.replace(/\d+$/,"")}).filter(Boolean);
return parts.map(function(p){return phonetic(p)}).join(" · ");
}

function phonetic(word){
let w=word.toLowerCase();
// Common phonetic overrides
let map={
"cyber":"SY-ber","quantum":"KWON-tum","pixel":"PIK-sel","neon":"NEE-on","glitch":"GLICH",
"phantom":"FAN-tum","rogue":"ROHG","vortex":"VOR-teks","nebula":"NEB-yoo-lah",
"azure":"AZH-er","phoenix":"FEE-niks","wraith":"RAYTH","valkyrie":"val-KEER-ee",
"mjolnir":"MYOL-neer","sigurd":"SIG-urd","einherjar":"ayn-HAIR-yar","draugr":"DROWG-r",
"kitsune":"kit-SOO-neh","shinobi":"shih-NOH-bee","samurai":"SAM-oo-rye",
"oni":"OH-nee","tengu":"TEN-goo","sakura":"sah-KOO-rah","ronin":"ROH-nin",
"aesthetic":"es-THET-ik","corsair":"KOR-sair","daemon":"DEE-mon","praetor":"PREE-tor",
"centurion":"sen-TOOR-ee-on","imperator":"im-peh-RAH-tor","solaris":"soh-LAR-is",
"cosmonaut":"KOZ-moh-nawt","quasar":"KWAY-zar","banshee":"BAN-shee","revenant":"REV-eh-nant",
"ghoul":"GOOL","specter":"SPEK-ter","arcane":"ar-KAYN","seraph":"SAIR-af"
};
if(map[w]) return map[w];
// Simple fallback: capitalize
return word.charAt(0).toUpperCase()+word.slice(1).toLowerCase();
}

// --- Username History ---
function addToHistory(username,style){
let hist=JSON.parse(storage.getItem("usernameHistory")||"[]");
hist.unshift({name:username,style:style,time:Date.now()});
if(hist.length>50) hist=hist.slice(0,50);
storage.setItem("usernameHistory",JSON.stringify(hist));
renderHistory();
}

function renderHistory(){
let hist=JSON.parse(storage.getItem("usernameHistory")||"[]");
let box=document.getElementById("historyList");
if(!box) return;
if(hist.length===0){
box.innerHTML='<div class="no-fav">No history yet</div>';
return;
}
box.innerHTML="";
// Show last 15
let show=hist.slice(0,15);
show.forEach(function(h){
let item=document.createElement("span");
item.className="history-item";

let name=document.createTextNode(h.name);
item.appendChild(name);

let time=document.createElement("span");
time.className="history-time";
let ago=timeAgo(h.time);
time.textContent=" "+ago;
item.appendChild(time);

item.addEventListener("click",function(){
navigator.clipboard.writeText(h.name);
showToast("Copied: "+h.name);
});
box.appendChild(item);
});
}

function timeAgo(ts){
let diff=Date.now()-ts;
let s=Math.floor(diff/1000);
if(s<60) return "just now";
let m=Math.floor(s/60);
if(m<60) return m+"m ago";
let h=Math.floor(m/60);
if(h<24) return h+"h ago";
let d=Math.floor(h/24);
return d+"d ago";
}
